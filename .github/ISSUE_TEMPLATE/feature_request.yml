name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for agent-teams-cc? Describe it below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature or improvement do you want?
      placeholder: Describe the feature clearly.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this solve? When would you use it?
      placeholder: |
        I'm trying to ... but currently I have to ...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? Include command syntax, expected behavior, or mockups.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've thought about or workarounds you're using.
    validations:
      required: false
